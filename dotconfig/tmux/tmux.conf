# Tmux Configuration
# Primary multiplexer — Ghostty is a dumb terminal, tmux runs everything.
# Prefix: cmd+i in Ghostty sends C-b (0x02).

# ============================================
# General Settings
# ============================================

set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on
set -g status off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -s escape-time 0
setw -g mode-keys vi

# ============================================
# Prefix Key
# ============================================
# Ghostty maps cmd+i → C-b (0x02). Default prefix, no change needed.
# Press cmd+i twice to send a literal C-b to the terminal.
set -g prefix C-b
bind C-b send-prefix

# ============================================
# Sidebar: auto-split on new session
# ============================================
# Every new session gets a fixed-width left pane running tmux-sidebar.
# -h = side-by-side  -b = before (left)  -d = don't steal focus  -l = columns
# Prepend flox bin to PATH so the sidebar binary can find tmux.
set-hook -g session-created 'split-window -hbd -l 33 "PATH=/Users/m/multitude/.flox/run/aarch64-darwin.multitude.dev/bin:${PATH} exec /Users/m/multitude/.bin/tmux-sidebar"'

# ============================================
# Theme
# ============================================

source-file -q ~/.config/tmux/dracula.conf

# ============================================
# Session Management
# ============================================

bind t new-session                                                     # new session
bind r display-popup -E -w 60% -h 3 "PATH=/Users/m/multitude/.flox/run/aarch64-darwin.multitude.dev/bin:${PATH} exec /Users/m/multitude/.bin/tmux-sidebar-cli rename-active-session"
bind s display-popup -E -w 50% -h 50% "PATH=/Users/m/multitude/.flox/run/aarch64-darwin.multitude.dev/bin:${PATH} exec /Users/m/multitude/.bin/tmux-commandpane"

# ============================================
# Pane Navigation (sidebar-aware)
# ============================================
# Sidebar is always pane 1 (leftmost, created by session-created hook).
# If navigation lands on pane 1, bounce back to previous pane.

bind a select-pane -L \; if-shell '[ "#{pane_index}" = "1" ]' 'select-pane -R'
bind d select-pane -R \; if-shell '[ "#{pane_index}" = "1" ]' 'select-pane -L'

# ============================================
# Pane Management
# ============================================

bind A split-window -hb -c "#{pane_current_path}"    # new pane to the left
bind D split-window -h -c "#{pane_current_path}"     # new pane to the right
bind q kill-pane                                      # close pane
bind z resize-pane -Z                                 # toggle zoom

# ============================================
# Pane Resizing (repeatable)
# ============================================

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# Utility
# ============================================

bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
bind v copy-mode
bind e run-shell 'tmux capture-pane -p -S -10000 > /tmp/tmux-scrollback.txt && ${EDITOR:-vim} /tmp/tmux-scrollback.txt'
