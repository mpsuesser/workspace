# Servers Layout: Single pane for server monitoring
# Mirrors Zellij's servers.kdl layout
#
# Usage: tmux source-file ~/.config/tmux/layouts/servers.conf

# Create new window named 'servers'
new-window -n servers -c /Users/m/_

# Send the command to start servers
send-keys 'bun --watch /Users/m/_/cli/servers.ts start' Enter
