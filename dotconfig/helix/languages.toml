# -----------------------------------------------------------------------------
# NOTE: Why explicit `formatter` + `except-features = ["format"]` on LSPs?
#
# Helix only supports LSP dynamic capability registration for didChangeWatchedFiles,
# NOT for formatting. LSPs like Biome that use dynamic registration to advertise
# formatting cause intermittent hangs (~10s timeout) and "file modified externally"
# errors. Using an explicit `formatter` field bypasses LSP formatting entirely while
# preserving LSP linting/diagnostics. The formatter reads stdin and writes stdout.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Servers
# -----------------------------------------------------------------------------

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]
required-root-patterns = ["biome.json", "biome.jsonc"]

[language-server.typescript-language-server.config]
diagnostics.ignoredCodes = [6133]

[language-server.rust-analyzer.config]
check = { command = "clippy" }
cargo = { features = "all" }

[language-server.yaml-language-server.config.yaml]
format = { enable = true }
validation = true

# -----------------------------------------------------------------------------
# Languages
# -----------------------------------------------------------------------------

[[language]]
name = "typescript"
roots = ["package.json", "tsconfig.json"]
shebangs = ["bun", "deno", "ts-node"]
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  { name = "biome", except-features = ["format"] },
]
auto-format = true
formatter = { command = "bunx", args = ["--bun", "biome", "check", "--write", "--linter-enabled=false", "--stdin-file-path=file.ts"] }

[[language]]
name = "tsx"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  { name = "biome", except-features = ["format"] },
  "tailwindcss-ls",
]
roots = ["package.json", "tsconfig.json"]
block-comment-tokens = { start = "{/*", end = "*/}" }
auto-format = true
formatter = { command = "bunx", args = ["--bun", "biome", "check", "--write", "--linter-enabled=false", "--stdin-file-path=file.tsx"] }

[[language]]
name = "go"
auto-format = true
formatter = { command = "goimports" }

[[language]]
name = "bash"
formatter = { command = "shfmt", args = ["-i", "2", "-ci"] } # Google's Style
language-servers = ["bash-language-server", "typos", "efm-langserver", "scls"]

[[language]]
name = "json"
auto-format = true
language-servers = [
  { name = "vscode-json-language-server", except-features = ["format"] },
  "biome",
]

[[language]]
name = "jsonc"
language-servers = [
  { name = "vscode-json-language-server", except-features = ["format"] },
  "biome",
]
file-types = [
  "jsonc",
  { glob = "tsconfig.json" },
  { glob = "tsconfig.*.json" },
  { glob = "bun.lock" },
]

[[language]]
name = "yaml"
language-servers = ["yaml-language-server", "typos", "efm-langserver", "scls"]
file-types = [
  { glob = "*.yaml" },
  { glob = "*.yml" }
]

[[language]]
name = "toml"
language-servers = ["taplo", "typos", "efm-langserver", "scls"]
formatter = { command = "taplo", args = ["format", "-"] }

[[language]]
name = "html"
auto-format = true
formatter = { command = 'prettier', args = ["--parser", "html"] }
language-servers = [
  "vscode-html-language-server",
  "tailwindcss-ls",
  "emmet-lsp",
]

[[language]]
name = "css"
formatter = { command = 'biome', args = ["format", "--write", "--stdin-file-path", "file.css"] }
language-servers = ["vscode-css-language-server", "tailwindcss-ls"]

[[language]]
name = "gel"
scope = "source.gel"
injection-regex = "esdl"
file-types = ["gel"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
roots = ["gel.toml"]

[[grammar]]
name ="esdl"
source = { git = "https://github.com/greym0uth/tree-sitter-esdl", rev = "df83acc8cacd0cfb139eecee0e718dc32c4f92e2" }
