name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: voidzero-dev/setup-vp@v1
              with:
                  cache: true

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.11"

            - name: Install
              run: bun install --frozen-lockfile

            - name: Lint & format
              run: vp check

            - name: Test
              run: bun run test

            - name: Typecheck
              run: bun run typecheck
