matches:
  - triggers: [;es.]
    replace: Schema.

  - triggers: [;es., ;esnes.]
    replace: Schema.NonEmptyString

  - triggers: [;es., ;ess.]
    replace: Schema.String

  - triggers: [;es., ;esS.]
    replace: Schema.Struct({ $|$ })

  - triggers: [;es., ;esr.]
    replace: "Schema.Record({ key: Schema.$|$, value: Schema.FILL })"

  - triggers: [;es., ;esn.]
    replace: Schema.Number

  - triggers: [;es., ;esb.]
    replace: Schema.Boolean

  - triggers: [;es., ;esa.]
    replace: Schema.Array($|$)

  - triggers: [;es., ;est.]
    replace: Schema.Tuple($|$)

  - triggers: [;es., ;esl.]
    replace: Schema.Literal($|$)

  - triggers: [;es., ;estl.]
    replace: Schema.TemplateLiteral($|$)

  - triggers: [;es., ;esu.]
    replace: Schema.Union($|$)

  - triggers: [;es., ;esx.]
    replace: Schema.Unknown

  - triggers: [;es., ;esio.]
    replace: Schema.instanceOf($|$)
