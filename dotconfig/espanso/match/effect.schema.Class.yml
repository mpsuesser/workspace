matches:
  - regex: ";esC:(?P<schemaName>.*)\\."
    replace: |-
      import { Schema } from "effect"

      export default class {{schemaName}} extends Schema.Class<{{schemaName}}>('{{schemaName}}')(
      {
        $|$: Schema.Unknown,
        field2: Schema.Unknown,
        field3: Schema.Unknown
      })
      {}

  # Schema.Class starter kit
