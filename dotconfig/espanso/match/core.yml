matches:
  - trigger: ;;s;
    replace: Schema

  - trigger: ;;snes
    replace: Schema.NonEmptyString

  - trigger: ;;sS;
    replace: Schema.Struct({ $|$ })

  - trigger: ;;e;
    replace: Effect

  - trigger: ;;eE
    replace: Effect.Effect<$|$>

  - trigger: ;;ex
    replace: export * from './$|$'

  - regex: ";;S (?P<name>.*);"
    replace: |-
      import { Schema } from 'effect';

      export class {{name}} extends Schema.Class<{{name}}>('{{name}}')({
        $|$
      })
      {}
