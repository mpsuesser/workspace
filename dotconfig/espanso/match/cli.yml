matches:
  - trigger: ;;cP
    replace: |-
      import { Args, Command, Options } from '@effect/cli';
      import { BunStream } from '@effect/platform-bun';
      import { Chunk, Console, Effect, Option, Stream } from 'effect';
      import { MainRuntime } from 'runtimes/main';

      const logJson = (value: unknown, singleLine = false) =>
      	Console.log(JSON.stringify(value, null, singleLine ? undefined : 2));

      const readStdinJson = Effect.gen(function* () {
      	const bytes = yield* Stream.runCollect(BunStream.stdin);
      	const text = new TextDecoder().decode(
      		Chunk.toReadonlyArray(bytes).reduce((acc, chunk) => {
      			const result = new Uint8Array(acc.length + chunk.length);
      			result.set(acc);
      			result.set(chunk, acc.length);
      			return result;
      		}, new Uint8Array(0))
      	);
      	return text;
      });

      const doSomethingCommand = Command.make(
      	'do-something',
      	{
      		input: Args.text({
      			name: 'input'
      		}).pipe(Args.optional),
      		someOption: Options.text('some-option')
      	},
      	({ input }) =>
      		Effect.gen(function* () {
      			const parsed = yield* Option.match(input, {
      				onSome: (p) =>
      					Effect.try({
      						try: () => JSON.parse(p),
      						catch: (error) =>
      							new Error(
      								`Invalid JSON payload: ${
      									error instanceof Error
      										? error.message
      										: String(error)
      								}`
      							)
      					}),
      				onNone: () => readStdinJson
      			});

      			return yield* logJson(parsed, true);
      		})
      );

      const rootCommand = Command.make('serve', {}, ({}) =>
      	Effect.gen(function* () {
      		// do something
      	})
      ).pipe(
      	Command.withSubcommands([
      		doSomethingCommand
      	])
      );

      const cli = Command.run(rootCommand, {
      	name: 'NAME_OF_CLI',
      	version: '1.0.0'
      });

      const program = cli(Bun.argv);

      MainRuntime.runPromise(program);
