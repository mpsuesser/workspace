matches:
  - triggers: [;pcx., ;pcdate]
    replace: |-
      Keep in mind your knowledge cutoff date. Today's date is {{todaysDate}}.

      You MUST use web search to retrieve truly accurate, up-to-date information. Many of the most important things are both new and not backwards-compatible.
    vars:
      - name: todaysDate
        type: date
        params:
          format: "%B %d %Y"
